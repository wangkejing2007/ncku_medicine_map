<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大學醫學系課程地圖</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-soft: #eef5ff;
      --text: #172033;
      --muted: #5f6f89;
      --line: #dce5f2;
      --accent: #1769aa;
      --accent-dark: #0d4d83;
      --accent-soft: #dff0ff;
      --shadow: 0 18px 40px rgba(21, 42, 75, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      line-height: 1.6;
    }

    .site-header {
      background: linear-gradient(135deg, #0d4d83, #1d7abd);
      color: #fff;
    }

    .header-inner {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0 48px;
    }

    .school-name {
      margin: 0 0 8px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 12px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.15;
    }

    h2 {
      margin-bottom: 8px;
      font-size: 1.45rem;
    }

    .lead {
      max-width: 760px;
      margin-bottom: 0;
      color: rgba(255, 255, 255, 0.88);
      font-size: 1.08rem;
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: -24px auto 56px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
      gap: 14px;
      align-items: end;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    select,
    input,
    button {
      min-height: 42px;
      border-radius: 6px;
      font: inherit;
    }

    select,
    input {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 8px 10px;
    }

    button {
      border: 0;
      background: var(--accent);
      color: #fff;
      padding: 0 18px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      background: var(--accent-dark);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 18px 0;
    }

    .summary-grid article {
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .summary-grid span {
      display: block;
      color: var(--accent);
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }

    .summary-grid p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .table-section,
    .competency-section {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .table-section {
      overflow: hidden;
    }

    .section-heading,
    .competency-section {
      padding: 24px;
    }

    .section-heading p {
      margin-bottom: 0;
      color: var(--muted);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 960px;
    }

    th,
    td {
      padding: 14px 16px;
      border-top: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: var(--surface-soft);
      color: var(--accent-dark);
      font-size: 0.92rem;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: #f9fbfe;
    }

    .tag {
      display: inline-block;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      padding: 3px 10px;
      font-size: 0.86rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .competency-section {
      margin-top: 18px;
    }

    .competency-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .competency-list span {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 8px 12px;
      color: var(--muted);
      font-weight: 700;
    }

    @media (max-width: 820px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      table {
        min-width: 0;
      }

      thead {
        display: none;
      }

      tbody,
      tr,
      td {
        display: block;
        width: 100%;
      }

      tr {
        border-top: 1px solid var(--line);
        padding: 12px 16px;
      }

      td {
        display: grid;
        grid-template-columns: 8.5rem 1fr;
        gap: 12px;
        border-top: 0;
        padding: 8px 0;
      }

      td::before {
        content: attr(data-label);
        color: var(--muted);
        font-weight: 800;
      }
    }

    @media print {
      .site-header {
        background: #fff;
        color: #000;
      }

      .page {
        width: 100%;
        margin: 0;
      }

      .toolbar {
        display: none;
      }

      .table-section,
      .competency-section,
      .summary-grid article {
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <p class="school-name">大學醫學系</p>
      <h1>醫學系課程地圖</h1>
      <p class="lead">
        以學年、學期、課程領域與核心能力整理醫學系課程架構，可直接作為 GitHub Pages 的單一 HTML 網頁使用。
      </p>
    </div>
  </header>

  <main class="page">
    <section class="toolbar" aria-label="課程篩選工具">
      <label>
        學年
        <select id="yearFilter">
          <option value="all">全部學年</option>
        </select>
      </label>
      <label>
        領域
        <select id="domainFilter">
          <option value="all">全部領域</option>
        </select>
      </label>
      <label>
        關鍵字
        <input id="searchInput" type="search" placeholder="搜尋課程、能力或備註">
      </label>
      <button id="resetButton" type="button">重設</button>
    </section>

    <section class="summary-grid" aria-label="課程地圖摘要">
      <article>
        <span id="courseCount">0</span>
        <p>門課程</p>
      </article>
      <article>
        <span>6</span>
        <p>學年架構</p>
      </article>
      <article>
        <span>8</span>
        <p>核心能力</p>
      </article>
    </section>

    <section class="table-section">
      <div class="section-heading">
        <h2>課程表格</h2>
        <p>可依學年與課程領域篩選；手機上會自動轉為卡片式閱讀。</p>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th scope="col">學年</th>
              <th scope="col">學期</th>
              <th scope="col">課程名稱</th>
              <th scope="col">領域</th>
              <th scope="col">核心能力</th>
              <th scope="col">先修或銜接</th>
              <th scope="col">備註</th>
            </tr>
          </thead>
          <tbody id="courseTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="competency-section">
      <h2>核心能力對照</h2>
      <div class="competency-list">
        <span>基礎醫學知識</span>
        <span>臨床推理</span>
        <span>病人照護</span>
        <span>溝通合作</span>
        <span>醫學倫理</span>
        <span>公共衛生</span>
        <span>研究與實證</span>
        <span>終身學習</span>
      </div>
    </section>
  </main>

  <script>
    const courses = [
      { year: '一年級', semester: '上', name: '普通生物學', domain: '基礎科學', competency: '基礎醫學知識、終身學習', prerequisite: '高中生物', note: '銜接細胞生物學與生理學' },
      { year: '一年級', semester: '上', name: '普通化學', domain: '基礎科學', competency: '基礎醫學知識', prerequisite: '高中化學', note: '銜接生物化學' },
      { year: '一年級', semester: '下', name: '有機化學', domain: '基礎科學', competency: '基礎醫學知識', prerequisite: '普通化學', note: '理解藥物與代謝分子基礎' },
      { year: '一年級', semester: '下', name: '醫學人文導論', domain: '醫學人文', competency: '醫學倫理、溝通合作', prerequisite: '無', note: '建立醫師專業角色認知' },
      { year: '二年級', semester: '上', name: '解剖學', domain: '基礎醫學', competency: '基礎醫學知識、臨床推理', prerequisite: '普通生物學', note: '含大體解剖與影像解剖' },
      { year: '二年級', semester: '上', name: '組織學與胚胎學', domain: '基礎醫學', competency: '基礎醫學知識', prerequisite: '普通生物學', note: '銜接病理學' },
      { year: '二年級', semester: '下', name: '生物化學', domain: '基礎醫學', competency: '基礎醫學知識、研究與實證', prerequisite: '普通化學、有機化學', note: '理解代謝與分子疾病' },
      { year: '二年級', semester: '下', name: '生理學', domain: '基礎醫學', competency: '基礎醫學知識、臨床推理', prerequisite: '解剖學', note: '銜接藥理學與內科學' },
      { year: '三年級', semester: '上', name: '病理學', domain: '基礎醫學', competency: '基礎醫學知識、臨床推理', prerequisite: '組織學、生理學', note: '疾病機轉核心課程' },
      { year: '三年級', semester: '上', name: '微生物學與免疫學', domain: '基礎醫學', competency: '基礎醫學知識、公共衛生', prerequisite: '普通生物學', note: '銜接感染症與疫苗議題' },
      { year: '三年級', semester: '下', name: '藥理學', domain: '基礎醫學', competency: '臨床推理、病人照護', prerequisite: '生理學、生物化學', note: '建立用藥安全概念' },
      { year: '三年級', semester: '下', name: '公共衛生與流行病學', domain: '公共衛生', competency: '公共衛生、研究與實證', prerequisite: '基礎統計', note: '銜接社區醫學與實證醫學' },
      { year: '四年級', semester: '上', name: '內科學', domain: '臨床醫學', competency: '臨床推理、病人照護', prerequisite: '病理學、藥理學', note: '系統性疾病診斷與治療' },
      { year: '四年級', semester: '上', name: '外科學', domain: '臨床醫學', competency: '臨床推理、病人照護', prerequisite: '解剖學、病理學', note: '含手術適應症與術前術後照護' },
      { year: '四年級', semester: '下', name: '婦產科學', domain: '臨床醫學', competency: '病人照護、溝通合作', prerequisite: '內科學、外科學', note: '重視性別友善與倫理議題' },
      { year: '四年級', semester: '下', name: '兒科學', domain: '臨床醫學', competency: '病人照護、溝通合作', prerequisite: '內科學', note: '涵蓋成長發展與兒童照護' },
      { year: '五年級', semester: '全年', name: '臨床實習：內外婦兒', domain: '臨床實習', competency: '病人照護、臨床推理、溝通合作', prerequisite: '四年級臨床醫學課程', note: '病房、門診與團隊照護訓練' },
      { year: '五年級', semester: '全年', name: '臨床技能與 OSCE', domain: '臨床實習', competency: '病人照護、溝通合作、醫學倫理', prerequisite: '臨床醫學課程', note: '標準化病人與臨床技能評量' },
      { year: '六年級', semester: '全年', name: '次專科選修實習', domain: '臨床實習', competency: '病人照護、終身學習', prerequisite: '核心臨床實習', note: '依興趣選擇次專科或跨領域場域' },
      { year: '六年級', semester: '全年', name: '社區醫學與偏鄉醫療', domain: '公共衛生', competency: '公共衛生、醫學倫理、溝通合作', prerequisite: '公共衛生與流行病學', note: '連結健康不平等與在地照護' }
    ];

    const yearFilter = document.querySelector('#yearFilter');
    const domainFilter = document.querySelector('#domainFilter');
    const searchInput = document.querySelector('#searchInput');
    const resetButton = document.querySelector('#resetButton');
    const tableBody = document.querySelector('#courseTableBody');
    const courseCount = document.querySelector('#courseCount');

    function uniqueValues(key) {
      return [...new Set(courses.map((course) => course[key]))];
    }

    function fillFilter(select, values) {
      values.forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function renderCourses() {
      const selectedYear = yearFilter.value;
      const selectedDomain = domainFilter.value;
      const keyword = searchInput.value.trim().toLowerCase();

      const filtered = courses.filter((course) => {
        const matchYear = selectedYear === 'all' || course.year === selectedYear;
        const matchDomain = selectedDomain === 'all' || course.domain === selectedDomain;
        const searchable = Object.values(course).join(' ').toLowerCase();
        const matchKeyword = keyword === '' || searchable.includes(keyword);
        return matchYear && matchDomain && matchKeyword;
      });

      tableBody.innerHTML = '';
      filtered.forEach((course) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td data-label="學年">${course.year}</td>
          <td data-label="學期">${course.semester}</td>
          <td data-label="課程名稱"><strong>${course.name}</strong></td>
          <td data-label="領域"><span class="tag">${course.domain}</span></td>
          <td data-label="核心能力">${course.competency}</td>
          <td data-label="先修或銜接">${course.prerequisite}</td>
          <td data-label="備註">${course.note}</td>
        `;
        tableBody.appendChild(row);
      });
      courseCount.textContent = filtered.length;
    }

    fillFilter(yearFilter, uniqueValues('year'));
    fillFilter(domainFilter, uniqueValues('domain'));
    yearFilter.addEventListener('change', renderCourses);
    domainFilter.addEventListener('change', renderCourses);
    searchInput.addEventListener('input', renderCourses);
    resetButton.addEventListener('click', () => {
      yearFilter.value = 'all';
      domainFilter.value = 'all';
      searchInput.value = '';
      renderCourses();
    });
    renderCourses();
  </script>
</body>
</html>
